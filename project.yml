name: TipJarNow
options:
  bundleIdPrefix: com.jiejuefuyou
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 jiejuefuyou. All rights reserved."
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
targets:
  TipJarNow:
    type: application
    platform: iOS
    sources:
      - path: TipJarNow
    resources:
      - path: TipJarNow/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.tipjarnow
        PRODUCT_NAME: TipJarNow
        INFOPLIST_KEY_CFBundleDisplayName: TipJar Now
        INFOPLIST_KEY_CFBundleLocalizations: "en ja zh-Hans zh-Hant ko es fr de"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        # Photo library access for the "upload your own receive code" flow
        # (WeChat / Alipay / PayPay / LINE Pay / Zelle). Base (en) value; each
        # locale overrides it via Resources/<lang>.lproj/InfoPlist.strings.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "TipJar Now needs access to your photos so you can pick your payment receive code to show on your tip card."
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"
  TipJarNowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TipJarNowTests
    dependencies:
      - target: TipJarNow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.tipjarnow.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TipJarNow.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TipJarNow"
  TipJarNowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TipJarNowUITests
    dependencies:
      - target: TipJarNow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.tipjarnow.uitests
        TEST_TARGET_NAME: TipJarNow
schemes:
  TipJarNow:
    build:
      targets:
        TipJarNow: all
        TipJarNowTests: [test]
        TipJarNowUITests: [test]
    test:
      config: Debug
      targets:
        - TipJarNowTests
        - TipJarNowUITests
    run:
      config: Debug
    archive:
      config: Release
