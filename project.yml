name: TipJarNow
options:
  bundleIdPrefix: com.jiejuefuyou
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 jiejuefuyou. All rights reserved."
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
targets:
  TipJarNow:
    type: application
    platform: iOS
    sources:
      - path: TipJarNow
        excludes:
          - "Resources/en.lproj"
          - "Resources/ja.lproj"
          - "Resources/zh-Hans.lproj"
          - "Resources/zh-Hant.lproj"
          - "Resources/ko.lproj"
          - "Resources/es.lproj"
          - "Resources/fr.lproj"
          - "Resources/de.lproj"
    resources:
      - path: TipJarNow/Resources/Assets.xcassets
      - path: TipJarNow/Resources/en.lproj
      - path: TipJarNow/Resources/ja.lproj
      - path: TipJarNow/Resources/zh-Hans.lproj
      - path: TipJarNow/Resources/zh-Hant.lproj
      - path: TipJarNow/Resources/ko.lproj
      - path: TipJarNow/Resources/es.lproj
      - path: TipJarNow/Resources/fr.lproj
      - path: TipJarNow/Resources/de.lproj
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.tipjarnow
        PRODUCT_NAME: TipJarNow
        INFOPLIST_KEY_CFBundleDisplayName: TipJar Now
        INFOPLIST_KEY_CFBundleLocalizations: "en ja zh-Hans zh-Hant ko es fr de"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"
schemes:
  TipJarNow:
    build:
      targets:
        TipJarNow: all
    run:
      config: Debug
    archive:
      config: Release
